<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Zenmart</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Jost:ital,wght@0,100..900;1,100..900&family=Raleway:ital,wght@0,100..900;1,100..900&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="./public/css/command.css" />
        <link rel="stylesheet" href="./public/css/home.css" />
    </head>
    <body>
        <div class="nawbar_frame">
            <div class="container">
                <div class="nawbar_top">
                    <a href="./index.html"
                        ><img src="./public/images/Zenmart..png" alt=""
                    /></a>
                    <div class="naw_search_frame">
                        <div class="search_box">
                            <div class="category_list">
                                <select name="" id="">
                                    <option value="all" selected>
                                        All category
                                    </option>
                                    <option value="laptop">laptop</option>
                                </select>
                            </div>
                            <input type="text" placeholder="Search products" />
                        </div>
                        <div class="search_icon_box">
                            <img src="./public/images/circle2017.png" alt="" />
                        </div>
                    </div>
                    <div class="naw_top_menu">
                        <div class="top_menu_box">
                            <div class="box_icon_box"><img src="./public/images/heart 1.png" alt="" /></div>
                            <div class="box_info_box"><span>Wishlist</span>
                            <strong> My Items</strong></div>
                            <div class="box_icon_box"><img src="./public/images/profile 1.svg" alt="" /></div>
                            <div class="box_info_box"><span>Sign In</span>
                            <strong>Account</strong></div>
                            <div class="box_icon_box">
                                <div class="basket_count">2</div><img src="./public/images/shopping-cart 1.svg" alt="" /></div>
                            <div class="box_info_box"><span>$200.99</span>
                            <strong> Total</strong></div>


                            </div>

                        </div>
                    </div>
                    <div class="nawbar_bot">
                        <div class="nawbar_bot_menu_box">
                            <div class="browse_box"><img src="./public/images/Group 44.svg" alt="">
                            <span>Browse Categories</span>
                        </div>
                        <div class="nawbar_route_menu">
                            <a href="" class="titel">Home</a>
                            <a href="">Shop</a>
                            <a href="">Orders</a>
                            <a href="">About</a>
                            <a href="">Contact</a>
                        </div>
                        <div div class="jaziw_menu">
                           <span>Deal of the Day </span>
                            <span>Hot Deals </span>
                            <span>Best Sellers</span>
                            <span>New Arrivals</span>

                        </div>


                        </div>

                    </div>
                </div>
                </div>
            </div>
        </div>
    </body>
</html>
